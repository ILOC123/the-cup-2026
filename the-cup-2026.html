          return'<td style="text-align:center;font-size:10px;padding:3px 4px;'+bg+'">'+v+'</td>';
        }).join('')+'</tr>';
    }).join('');

    // Match-Ergebnisse
    var matchHtml='';
    var spielplanSrc=e.spielplan||e.matches||[];
    if(spielplanSrc.length){
      var days=['Donnerstag','Freitag','Samstag','Dübler Par3'];
      days.forEach(function(day){
        var dm=spielplanSrc.filter(function(m){return m.day===day;});
        if(!dm.length)return;
        matchHtml+='<div style="font-size:10px;color:var(--gold);font-weight:700;margin:8px 0 4px;text-transform:uppercase;letter-spacing:0.5px">'+day+'</div>';
        dm.forEach(function(m){
          var rPts=m.tA==='rot'?m.rotPts:m.blauPts;
          var bPts=m.tA==='rot'?m.blauPts:m.rotPts;
          var res=rPts!=null?(rPts>bPts?'🔴':bPts>rPts?'🔵':'½'):'–';
          var resCol=rPts!=null&&rPts>bPts?'var(--rot-m)':rPts!=null&&bPts>rPts?'var(--blau-m)':rPts!=null?'var(--gold)':'var(--grey)';
          var courseName=m.ckey==='OLD'?'Old':m.ckey==='NEW'?'New':m.ckey||'';
          matchHtml+='<div style="display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)">'
            +'<span style="color:var(--rot-m);font-weight:600">'+m.pA+'</span>'
            +'<span style="color:var(--grey);font-size:10px">vs</span>'
            +'<span style="color:var(--blau-m);font-weight:600">'+m.pB+'</span>'
            +'<span style="margin-left:auto;font-size:10px;color:var(--grey)">'+m.fmt+' · '+courseName+' · '+m.holes+'L</span>'
            +'<span style="min-width:18px;text-align:center;font-weight:700;color:'+resCol+'">'+res+'</span>'
            +'</div>';
        });
      });
    }

    return'<div class="ac" style="margin-bottom:8px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
      +'<div>'
      +'<div style="font-size:15px;font-weight:700;color:var(--white)">'+e.name+'</div>'
      +'<div style="font-size:11px;color:var(--grey);margin-top:2px">'+e.datum+'</div>'
      +'</div>'
      +'<button data-aid="'+e.id+'" onclick="delArchiv(this.dataset.aid)" style="background:transparent;border:1px solid rgba(192,57,43,0.4);color:var(--rot-m);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer">🗑 Loeschen</button>'
      +'</div>'

      // Endstand
      +'<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:14px;background:var(--dark3);border-radius:10px;padding:12px">'
      +'<div style="text-align:center">'
      +'<div style="font-size:11px;color:var(--rot-m);margin-bottom:4px">🔴 Team Rot</div>'
      +'<div style="font-size:28px;font-weight:700;color:var(--rot-m)">'+fmt(e.rotTotal)+'</div>'
      +'<div style="font-size:10px;color:var(--grey);margin-top:4px">'+e.rot.join(', ')+'</div>'
      +'</div>'
      +'<div style="text-align:center;font-size:11px;font-weight:700;color:'+winCls+'">'+winner+'</div>'
      +'<div style="text-align:center">'
      +'<div style="font-size:11px;color:var(--blau-m);margin-bottom:4px">🔵 Team Blau</div>'
      +'<div style="font-size:28px;font-weight:700;color:var(--blau-m)">'+fmt(e.blauTotal)+'</div>'
      +'<div style="font-size:10px;color:var(--grey);margin-top:4px">'+e.blau.join(', ')+'</div>'
      +'</div>'
      +'</div>'

      // Matrix
      +'<div style="font-size:10px;color:var(--grey);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Begegnungsmatrix</div>'
      +'<div style="overflow-x:auto;margin-bottom:12px"><table style="border-collapse:collapse;width:100%;font-size:10px">'
      +'<tr><th style="font-size:9px;padding:3px 4px"></th>'+hdr+'</tr>'+rows
      +'</table></div>'

      // Match-Ergebnisse (aufklappbar)
      +(matchHtml?'<details style="margin-top:4px"><summary style="font-size:11px;color:var(--grey);cursor:pointer;padding:4px 0">Match-Ergebnisse anzeigen</summary>'
        +'<div style="margin-top:8px">'+matchHtml+'</div></details>':'')
      +'</div>';
  }).join('');

  return form+entries;
}

let _confettiShown=false;
function launchConfetti(team){
  if(_confettiShown)return;_confettiShown=true;
  var canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;z-index:9996;pointer-events:none';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  var cols=team==='rot'
    ?['#C0392B','#E74C3C','#F1948A','#ffffff','#C9960A']
    :['#2980B9','#3498DB','#85C1E9','#ffffff','#C9960A'];
  var pts=Array.from({length:150},function(){return{
    x:Math.random()*canvas.width,
    y:-20-Math.random()*300,
    w:7+Math.random()*9,h:4+Math.random()*6,
    col:cols[Math.floor(Math.random()*cols.length)],
    vx:(Math.random()-0.5)*3,vy:2.5+Math.random()*3,
    rot:Math.random()*Math.PI*2,rv:(Math.random()-0.5)*0.14
  };});
  var t0=Date.now();
  function frame(){
    var el=Date.now()-t0;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;
      var alpha=el<3500?1:Math.max(0,1-(el-3500)/1000);
      ctx.save();ctx.globalAlpha=alpha;
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.col;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if(el<4500)requestAnimationFrame(frame);
    else canvas.remove();
  }
  requestAnimationFrame(frame);
}
