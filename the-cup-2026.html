<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Cup 2026 ⛳</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Cup">
<meta name="theme-color" content="#0D1117">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ───────────────────────────────────────────── */
:root{
  --rot:#C0392B;--rot-m:#E74C3C;--blau:#1A3A5C;--blau-m:#2980B9;
  --gold:#C9960A;--gold-l:#F5C842;
  --dark:#0D1117;--dark2:#161B22;--dark3:#21262D;--dark4:#2C3240;
  --grey:#8B949E;--grey-l:#B0BAC8;--white:#FFFFFF;
  --green:#27AE60;--orange:#E67E22;
  --font:'DM Sans',sans-serif;--display:'Bebas Neue',cursive;--mono:'DM Mono',monospace;
  --r:12px;--r-sm:8px;
  /* Touch targets: min 44px */
  --touch:44px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--dark);color:var(--white);font-family:var(--font);overscroll-behavior:none;-webkit-text-size-adjust:100%;}

/* ── SPLASH ──────────────────────────────────────────────── */
#splash{position:fixed;inset:0;z-index:1000;
  background:linear-gradient(160deg,#0D1117 0%,#1A3A5C 55%,#C0392B 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:32px 20px 24px;overflow-y:auto;}
.logo{font-family:var(--display);font-size:clamp(52px,14vw,76px);letter-spacing:4px;
  line-height:1;text-align:center;margin-top:8px;}
.logo span{color:var(--gold);}
.sub{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--grey);
  margin-top:6px;margin-bottom:28px;}
.splbl{font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--grey-l);margin-bottom:10px;align-self:flex-start;max-width:440px;width:100%;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:440px;}
/* Player buttons - big touch targets */
.pbtn{background:rgba(255,255,255,0.08);border:3px solid rgba(255,255,255,0.15);
  border-radius:16px;padding:16px 10px;cursor:pointer;text-align:center;
  position:relative;overflow:hidden;min-height:72px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all 0.15s;box-shadow:0 2px 12px rgba(0,0,0,0.25);}
.pbtn.rot{border-color:var(--rot-m);background:rgba(192,57,43,0.2);
  box-shadow:0 2px 14px rgba(192,57,43,0.25);}
.pbtn.blau{border-color:var(--blau-m);background:rgba(41,128,185,0.2);
  box-shadow:0 2px 14px rgba(41,128,185,0.25);}
.pbtn:active{transform:scale(0.94);}
.pbtn .dot{width:8px;height:8px;border-radius:50%;margin-bottom:6px;}
.pbtn.rot .dot{background:var(--rot-m);box-shadow:0 0 8px rgba(231,76,60,0.6);}
.pbtn.blau .dot{background:var(--blau-m);box-shadow:0 0 8px rgba(41,128,185,0.6);}
.pbtn .pn{font-size:16px;font-weight:700;letter-spacing:0.3px;}
.pbtn .ph{font-size:11px;color:var(--grey);margin-top:3px;font-family:var(--mono);}
/* Selected state - very visible */
.pbtn.sel{background:rgba(201,150,10,0.18);border-color:var(--gold);border-width:2.5px;
  box-shadow:0 0 20px rgba(201,150,10,0.25);}
.pbtn.sel::after{content:'✓';position:absolute;top:7px;right:9px;
  font-size:14px;color:var(--gold);font-weight:800;}
.pbtn.sel .pn{color:var(--gold);}
/* Guest button */
.gbtn{margin-top:0;width:100%;background:transparent;
  border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px;
  color:var(--grey);font-size:14px;cursor:pointer;font-family:var(--font);
  min-height:50px;letter-spacing:0.3px;}
.gbtn:active{opacity:0.7;}
/* WEITER button - very prominent */
.stbtn{margin-top:16px;width:100%;max-width:440px;
  background:linear-gradient(135deg,var(--gold),#F0B429);
  border:none;border-radius:16px;padding:20px;
  color:#0D1117;font-size:20px;font-weight:800;
  cursor:pointer;font-family:var(--display);letter-spacing:2px;
  box-shadow:0 6px 30px rgba(201,150,10,0.5);
  display:none;min-height:64px;
  animation:pulse-gold 1.5s ease-in-out infinite;}
.stbtn.vis{display:block;}
@keyframes pulse-gold{
  0%,100%{box-shadow:0 6px 30px rgba(201,150,10,0.5);}
  50%{box-shadow:0 6px 40px rgba(201,150,10,0.8);}
}

/* ── APP SHELL ───────────────────────────────────────────── */
#app{display:none;flex-direction:column;height:100dvh;}#app.on{display:flex;}

/* ── TOPBAR ──────────────────────────────────────────────── */
#topbar{background:var(--dark2);padding:10px 14px 8px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.title{font-family:var(--display);font-size:20px;letter-spacing:2px;}.title span{color:var(--gold);}
.badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);
  border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600;}
.badge .dot{width:7px;height:7px;border-radius:50%;}

/* ── TABS ────────────────────────────────────────────────── */
#tabs{display:flex;background:var(--dark2);
  border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.tab{flex:1;padding:10px 2px;text-align:center;font-size:9px;font-weight:700;
  letter-spacing:0.3px;text-transform:uppercase;color:var(--grey);
  cursor:pointer;border-bottom:2px solid transparent;
  min-height:var(--touch);display:flex;align-items:center;justify-content:center;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}

/* ── CONTENT ─────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view{display:none;padding:0 0 90px;}.view.on{display:block;}

/* ── SCOREBOARD ──────────────────────────────────────────── */
.sbh{background:linear-gradient(135deg,var(--dark2),var(--dark3));padding:16px 14px 14px;}
.sbb{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:14px;}
.ts{text-align:center;}
.ts .tn{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px;}
.ts.rot .tn{color:var(--rot-m);}.ts.blau .tn{color:var(--blau-m);}
.ts .pts{font-family:var(--display);font-size:clamp(52px,14vw,72px);line-height:1;}
.ts.rot .pts{color:var(--rot-m);}.ts.blau .pts{color:var(--blau-m);}
.svs{font-family:var(--display);font-size:24px;color:var(--grey);}
.stit{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--grey);padding:12px 14px 5px;}

/* Day cards */
.fc{margin:3px 10px;border-radius:var(--r);overflow:hidden;
  background:var(--dark2);border:1px solid rgba(255,255,255,0.06);}
.fch{display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);}
.fch .cn{font-size:13px;font-weight:600;}.fch .cs{font-size:10px;color:var(--grey);margin-top:1px;}
.fsc{display:flex;align-items:center;gap:8px;}
.fsn{font-family:var(--mono);font-size:18px;font-weight:500;width:24px;text-align:center;}
.fsn.rot{color:var(--rot-m);}.fsn.blau{color:var(--blau-m);}
.fss{color:var(--grey);font-size:12px;}
.wp{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:2px 7px;border-radius:20px;}
.wp.rot{background:rgba(192,57,43,0.2);color:var(--rot-m);}
.wp.blau{background:rgba(41,128,185,0.2);color:var(--blau-m);}
.wp.tie{background:rgba(201,150,10,0.2);color:var(--gold);}

/* Player ranking */
.pli{display:flex;align-items:center;padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,0.04);position:relative;transition:background 0.2s;}
.pli:last-child{border-bottom:none;}
/* Podium rows – card style with medal border + team outline */
.pli.gold-row,.pli.silver-row,.pli.bronze-row{
  margin:5px 10px;border-radius:14px;border-bottom:none;padding:12px 14px;}
.pli.gold-row{
  background:linear-gradient(135deg,rgba(201,150,10,0.18) 0%,rgba(201,150,10,0.08) 100%);
  border:3px solid #C9960A;
  box-shadow:0 0 18px rgba(201,150,10,0.3),inset 0 1px 0 rgba(255,255,255,0.08);}
.pli.silver-row{
  background:linear-gradient(135deg,rgba(189,195,199,0.16) 0%,rgba(189,195,199,0.06) 100%);
  border:3px solid #BDC3C7;
  box-shadow:0 0 14px rgba(189,195,199,0.2),inset 0 1px 0 rgba(255,255,255,0.06);}
.pli.bronze-row{
  background:linear-gradient(135deg,rgba(205,127,50,0.16) 0%,rgba(205,127,50,0.06) 100%);
  border:3px solid #CD7F32;
  box-shadow:0 0 14px rgba(205,127,50,0.2),inset 0 1px 0 rgba(255,255,255,0.06);}
/* Team-color inner left accent bar */
.pli.gold-row.team-rot,.pli.silver-row.team-rot,.pli.bronze-row.team-rot{border-left:5px solid var(--rot-m);}
.pli.gold-row.team-blau,.pli.silver-row.team-blau,.pli.bronze-row.team-blau{border-left:5px solid var(--blau-m);}
.pli.podium-last{margin-bottom:10px;}
/* Rank number/medal */
.rnk{font-size:20px;width:32px;flex-shrink:0;text-align:center;}
.rnk.plain{font-family:var(--mono);font-size:12px;color:var(--grey);line-height:32px;}
/* Avatar circle */
.pavatar{width:34px;height:34px;border-radius:50%;margin-right:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;letter-spacing:0.5px;}
.pavatar.rot{background:rgba(192,57,43,0.25);color:var(--rot-m);}
.pavatar.blau{background:rgba(41,128,185,0.2);color:var(--blau-m);}
.pavatar.gold-av{background:rgba(201,150,10,0.25);color:#F0B429;border:1.5px solid rgba(201,150,10,0.5);}
.pavatar.silver-av{background:rgba(189,195,199,0.15);color:#BDC3C7;border:1.5px solid rgba(189,195,199,0.4);}
.pavatar.bronze-av{background:rgba(205,127,50,0.15);color:#CD7F32;border:1.5px solid rgba(205,127,50,0.4);}
.pi2{flex:1;min-width:0;}
.pi2 .n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi2 .t{font-size:10px;color:var(--grey);margin-top:1px;}
/* Points badge */
.pp{font-family:var(--mono);font-size:15px;font-weight:700;
  border-radius:8px;padding:4px 10px;flex-shrink:0;}
.pp.rot{color:var(--rot-m);background:rgba(192,57,43,0.15);}
.pp.blau{color:var(--blau-m);background:rgba(41,128,185,0.15);}
.pp.gold-pp{color:#F0B429;background:rgba(201,150,10,0.2);box-shadow:0 0 10px rgba(201,150,10,0.25);}
.pp.silver-pp{color:#BDC3C7;background:rgba(189,195,199,0.15);}
.pp.bronze-pp{color:#CD7F32;background:rgba(205,127,50,0.15);}

/* NTP scoreboard */
.ntp-sb{margin:3px 10px;border-radius:var(--r);background:var(--dark2);
  border:1px solid rgba(255,255,255,0.06);overflow:hidden;}
.ntp-sb-hdr{padding:8px 12px 7px;border-bottom:1px solid rgba(255,255,255,0.04);
  display:flex;align-items:center;gap:7px;}
.ntp-sb-row{display:flex;align-items:center;padding:7px 12px;
  border-bottom:1px solid rgba(255,255,255,0.03);gap:7px;flex-wrap:wrap;}
.ntp-sb-row:last-child{border-bottom:none;}
.ntp-sb-lbl{flex:1;font-size:11px;color:var(--grey);}
.ntp-win-badge{font-size:11px;font-weight:700;}
.ntp-pts-badge{font-size:10px;background:rgba(201,150,10,0.15);color:var(--gold);
  border-radius:5px;padding:1px 5px;font-family:var(--mono);}

/* ── SCORING LIST ────────────────────────────────────────── */
.rsel{padding:12px 10px 6px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.rsel::-webkit-scrollbar{display:none;}
.rchip{flex-shrink:0;padding:8px 12px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--dark3);border:1.5px solid rgba(255,255,255,0.1);
  cursor:pointer;white-space:nowrap;font-family:var(--font);
  min-height:var(--touch);display:flex;align-items:center;}
.rchip.on{background:var(--gold);border-color:var(--gold);color:var(--dark);}
.msel{padding:0 10px 6px;display:flex;flex-direction:column;gap:6px;}
.mc{padding:11px 12px;border-radius:var(--r);background:var(--dark2);
  border:1.5px solid rgba(255,255,255,0.07);cursor:pointer;
  display:flex;align-items:center;gap:10px;font-family:var(--font);
  min-height:var(--touch);}
.mc .mct{flex:1;min-width:0;}
.mc .mcf{font-size:10px;color:var(--grey);font-weight:400;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc .mcs{font-size:10px;color:var(--green);font-weight:700;}
.mcdp{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.mcd{width:6px;height:6px;border-radius:50%;}

/* ── SCORE ENTRY ─────────────────────────────────────────── */
.seh{background:var(--dark2);padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;gap:8px;}
.seh .mt{font-size:12px;font-weight:700;line-height:1.3;}
.seh .mf{font-size:10px;color:var(--grey);margin-top:2px;}
.bk{background:var(--dark3);border:none;border-radius:var(--r-sm);
  padding:8px 12px;color:var(--white);font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--font);min-height:var(--touch);
  display:flex;align-items:center;flex-shrink:0;}

/* Live score strip */
.ss{background:var(--dark3);padding:10px 14px;margin:0;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:52px;z-index:10;
  border-bottom:2px solid rgba(255,255,255,0.08);}
.st2{text-align:center;}
.st2 .sn{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.st2.rot .sn{color:var(--rot-m);}.st2.blau .sn{color:var(--blau-m);}
.st2 .sp{font-size:13px;font-weight:700;line-height:1.3;margin-top:1px;}
.st2.rot .sp{color:var(--rot-m);}.st2.blau .sp{color:var(--blau-m);}
.sm{text-align:center;}
.sm .stx{font-size:22px;font-weight:800;font-family:var(--display);letter-spacing:1px;}
.sm .shl{font-size:10px;color:var(--grey);margin-top:3px;}
.stx.rl{color:var(--rot-m);}.stx.bl{color:var(--blau-m);}.stx.tie{color:var(--gold);}
.infob{padding:7px 12px;font-size:10px;background:var(--dark3);
  border-bottom:1px solid rgba(255,255,255,0.04);line-height:1.6;color:var(--grey-l);}

/* ── LOCH TABLE ──────────────────────────────────────────── */
.loch-tbl{width:100%;}
.lr{display:grid;padding:0 6px;border-bottom:1px solid rgba(255,255,255,0.04);
  align-items:center;min-height:50px;}
.lr.hdr{background:var(--dark3);padding-top:5px;padding-bottom:5px;min-height:30px;
  font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--grey);position:sticky;top:0;z-index:5;}
.lr.cur{background:rgba(201,150,10,0.06);}
.lr.dn{opacity:0.6;}
.lr.ntp{background:rgba(231,76,60,0.04);}
.lnum{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--white);text-align:center;}
.lpar{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--grey-l);text-align:center;}
.lstrok{font-size:11px;font-weight:700;text-align:center;line-height:1.3;color:var(--gold);}

/* Score input widget */
.scw{display:flex;align-items:center;justify-content:center;
  background:var(--dark3);border-radius:var(--r-sm);overflow:visible;
  border:2.5px solid rgba(255,255,255,0.2);}
.scw.rb{border-color:rgba(192,57,43,0.8);border-width:2.5px;}.scw.bb{border-color:rgba(41,128,185,0.8);border-width:2.5px;}
.scbtn{width:32px;height:44px;border:none;background:transparent;
  color:var(--grey);font-size:22px;cursor:pointer;
  font-family:var(--font);display:flex;align-items:center;justify-content:center;}
.scbtn:active{background:rgba(255,255,255,0.12);}
.guest-mode .scbtn{opacity:0;pointer-events:none;width:0;overflow:hidden;}
.scv{font-family:var(--mono);font-size:15px;font-weight:700;
  min-width:38px;height:38px;text-align:center;line-height:38px;color:var(--white);
  position:relative;display:flex;align-items:center;justify-content:center;z-index:1;}

/* Golf Scorecard Darstellung */
/* Eagle: doppelter Kreis */
.scv.eagle{color:#F1C40F;}
.scv.eagle::before,.scv.eagle::after{
  content:'';position:absolute;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border:2px solid #F1C40F;pointer-events:none;z-index:0;}
.scv.eagle::before{width:30px;height:30px;}
.scv.eagle::after{width:22px;height:22px;}

/* Birdie: ein Kreis */
.scv.birdie{color:#27AE60;}
.scv.birdie::before{
  content:'';position:absolute;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:30px;height:30px;
  border:2px solid #27AE60;pointer-events:none;z-index:0;}

/* Par: weisse Zahl, kein Rahmen */
.scv.par{color:var(--white);}

/* Bogey: ein Quadrat */
.scv.bogey{color:var(--orange);}
.scv.bogey::before{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:30px;height:30px;
  border:2px solid var(--orange);pointer-events:none;z-index:0;}

/* Doppelbogey+: zwei Quadrate */
.scv.double,.scv.worse{color:var(--rot-m);}
.scv.double::before,.scv.worse::before{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:34px;height:34px;
  border:2px solid var(--rot-m);pointer-events:none;z-index:0;}
.scv.double::after,.scv.worse::after{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:26px;height:26px;
  border:2px solid var(--rot-m);pointer-events:none;z-index:0;}
/* Stableford: larger named input widget */
.scw-s{display:flex;flex-direction:column;border-radius:var(--r-sm);overflow:hidden;
  border:1.5px solid rgba(255,255,255,0.08);background:var(--dark3);}
.scw-s.rb{border-color:rgba(192,57,43,0.45);}.scw-s.bb{border-color:rgba(41,128,185,0.45);}
.scw-name{font-size:9px;font-weight:700;text-align:center;padding:3px 4px 0;
  letter-spacing:0.5px;color:var(--grey-l);}
.scw-s.rb .scw-name{color:var(--rot-m);}.scw-s.bb .scw-name{color:var(--blau-m);}
.scw-row{display:flex;align-items:center;justify-content:center;}


/* Result badges */
.hr{display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:700;
  background:var(--dark3);border-radius:6px;padding:4px 3px;min-width:40px;}
.hr.rl{color:var(--rot-m);background:rgba(192,57,43,0.18);}
.hr.bl{color:var(--blau-m);background:rgba(41,128,185,0.18);}
.hr.tie{color:var(--gold);background:rgba(201,150,10,0.18);}
.spb{display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:13px;font-weight:700;
  background:var(--dark3);border-radius:6px;padding:2px 4px;
  min-width:24px;min-height:40px;}
.spb.pos{color:var(--green);background:rgba(39,174,96,0.18);}
.spb.zero{color:rgba(255,255,255,0.2);}

/* ── NTP INPUT ───────────────────────────────────────────── */
.ntp-row{background:rgba(201,150,10,0.05);
  border-top:1px solid rgba(201,150,10,0.15);padding:8px 10px;}
.ntp-lbl{font-size:9px;color:var(--gold);font-weight:700;
  letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block;}
.ntp-teams{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ntp-team{background:var(--dark2);border-radius:var(--r-sm);padding:7px 8px;}
.ntp-team-lbl{font-size:10px;font-weight:700;margin-bottom:5px;}
.ntp-team.rot-t .ntp-team-lbl{color:var(--rot-m);}
.ntp-team.blau-t .ntp-team-lbl{color:var(--blau-m);}
.ntp-mc{display:flex;align-items:center;gap:3px;}
.ntp-num{background:var(--dark3);border:1.5px solid rgba(201,150,10,0.3);
  border-radius:6px;padding:6px 3px;color:var(--gold);
  font-family:var(--mono);font-size:15px;font-weight:700;
  width:42px;text-align:center;min-height:var(--touch);}
.ntp-num:focus{outline:none;border-color:var(--gold);}
.ntp-unit{font-size:9px;color:var(--grey);}
.ntp-result{display:flex;align-items:center;justify-content:center;
  margin-top:5px;font-size:11px;font-weight:700;min-height:16px;}

/* ── SPIELER ─────────────────────────────────────────────── */
.spc{margin:3px 10px;border-radius:var(--r);background:var(--dark2);
  border:1px solid rgba(255,255,255,0.06);overflow:hidden;}
.sph{display:flex;align-items:center;padding:12px 12px 9px;gap:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);}
.spav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.spav.rot{background:rgba(192,57,43,0.25);color:var(--rot-m);}
.spav.blau{background:rgba(41,128,185,0.2);color:var(--blau-m);}
.spnm{font-size:14px;font-weight:700;}.sphcp{font-size:10px;color:var(--grey);margin-top:1px;}
.sptot{margin-left:auto;font-family:var(--display);font-size:30px;flex-shrink:0;}
.sptot.rot{color:var(--rot-m);}.sptot.blau{color:var(--blau-m);}
.sprnds{padding:8px 12px;display:flex;gap:5px;flex-wrap:wrap;}
.rb2{font-size:10px;padding:3px 8px;border-radius:14px;font-family:var(--mono);
  font-weight:500;display:flex;align-items:center;gap:3px;}
.rb2 .rp{font-weight:700;}
.rb2.rot{background:rgba(192,57,43,0.12);color:#E74C3C;}
.rb2.blau{background:rgba(41,128,185,0.12);color:#3498DB;}

/* ── ADMIN ───────────────────────────────────────────────── */
.as{padding:10px;}
.ac{background:var(--dark2);border:1px solid rgba(255,255,255,0.06);
  border-radius:var(--r);padding:14px;margin-bottom:8px;}
.ac h3{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;}
.atabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.atab{padding:7px 12px;border-radius:18px;font-size:11px;font-weight:600;
  background:var(--dark3);border:1.5px solid rgba(255,255,255,0.1);
  cursor:pointer;font-family:var(--font);color:var(--grey);
  min-height:var(--touch);display:flex;align-items:center;}
.atab.on{background:var(--gold);border-color:var(--gold);color:var(--dark);}

/* Result buttons */
.amr{display:flex;align-items:center;padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);gap:7px;}
.amr:last-child{border-bottom:none;}
.aml{flex:1;font-size:11px;min-width:0;}
.aml .amt{font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.aml .amf{font-size:10px;color:var(--grey);}
.rbs{display:flex;gap:3px;flex-shrink:0;}
.rbtn{padding:6px 9px;border-radius:var(--r-sm);border:1.5px solid rgba(255,255,255,0.1);
  background:transparent;color:var(--grey);font-size:12px;font-weight:700;
  cursor:pointer;font-family:var(--font);min-height:var(--touch);
  display:flex;align-items:center;}
.rbtn.ar{background:rgba(192,57,43,0.25);border-color:var(--rot-m);color:var(--rot-m);}
.rbtn.ab{background:rgba(41,128,185,0.25);border-color:var(--blau-m);color:var(--blau-m);}
.rbtn.at{background:rgba(201,150,10,0.25);border-color:var(--gold);color:var(--gold);}

/* Player editor */
.per{display:flex;align-items:center;gap:7px;padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);}
.per:last-child{border-bottom:none;}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ei{background:var(--dark3);border:1.5px solid rgba(255,255,255,0.1);
  border-radius:var(--r-sm);padding:8px 10px;color:white;font-size:15px;
  font-family:var(--font);min-height:var(--touch);}
.ei:focus{outline:none;border-color:var(--gold);}
.ei.ni{flex:1;min-width:0;}.ei.hi{width:60px;text-align:center;}
.el{font-size:9px;color:var(--grey);margin-bottom:2px;text-transform:uppercase;letter-spacing:1px;}
.svb{background:var(--green);border:none;border-radius:var(--r-sm);
  padding:8px 14px;color:white;font-size:13px;font-weight:700;
  cursor:pointer;font-family:var(--font);min-height:var(--touch);
  display:flex;align-items:center;justify-content:center;}

/* Admin selects */
.asel{width:100%;background:var(--dark3);border:1.5px solid rgba(255,255,255,0.1);
  border-radius:var(--r-sm);padding:8px 8px;color:white;font-size:13px;
  font-family:var(--font);min-height:var(--touch);}
.asel:focus{outline:none;border-color:var(--gold);}
.ain{width:100%;background:var(--dark3);border:1.5px solid rgba(255,255,255,0.1);
  border-radius:var(--r-sm);padding:8px 8px;color:white;font-size:13px;
  font-family:var(--font);min-height:var(--touch);}
.ain:focus{outline:none;border-color:var(--gold);}

/* Toggle switch */
.trow{display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.trow:last-child{border-bottom:none;}
.trow-lbl{font-size:13px;font-weight:600;}.trow-sub{font-size:10px;color:var(--grey);margin-top:2px;}
.tog{position:relative;width:46px;height:26px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;}
.tsl{position:absolute;cursor:pointer;inset:0;background:var(--dark3);
  border-radius:13px;transition:0.25s;border:1.5px solid rgba(255,255,255,0.1);}
.tsl::before{content:'';position:absolute;height:18px;width:18px;
  left:3px;bottom:2px;background:var(--grey);border-radius:50%;transition:0.25s;}
.tog input:checked + .tsl{background:rgba(201,150,10,0.3);border-color:var(--gold);}
.tog input:checked + .tsl::before{transform:translateX(20px);background:var(--gold);}

/* Match editor */
.mer{background:var(--dark3);border-radius:10px;padding:10px;margin-bottom:7px;}
.mef-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.mef-id{font-size:9px;color:var(--grey);font-family:var(--mono);}
.mef-g{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px;}
.mef-f label{font-size:9px;color:var(--grey);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px;}
.mef-f select{width:100%;background:var(--dark2);border:1.5px solid rgba(255,255,255,0.1);
  border-radius:var(--r-sm);padding:7px 6px;color:white;font-size:12px;
  font-family:var(--font);min-height:var(--touch);}
.mef-f select:focus{outline:none;border-color:var(--gold);}

/* HCP table */
.htbl{width:100%;border-collapse:collapse;}
.htbl th{font-size:9px;color:var(--grey);font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:5px 7px;text-align:left;
  border-bottom:1px solid rgba(255,255,255,0.07);}
.htbl td{padding:6px 7px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
.htbl tr:last-child td{border-bottom:none;}
.chcp{font-family:var(--mono);font-weight:700;font-size:14px;text-align:center;}
.chcp.rot{color:var(--rot-m);}.chcp.blau{color:var(--blau-m);}
.tee-pill{font-size:9px;padding:2px 6px;border-radius:9px;font-weight:600;display:inline-block;}
.tGelb{background:rgba(201,150,10,0.2);color:var(--gold);}
.tRot{background:rgba(192,57,43,0.2);color:var(--rot-m);}
.tWeiss{background:rgba(255,255,255,0.1);color:white;}
.tBlau{background:rgba(41,128,185,0.2);color:var(--blau-m);}
.tGruen{background:rgba(39,174,96,0.2);color:var(--green);}
.tStandard{background:rgba(39,174,96,0.2);color:var(--green);}

/* Duell matrix */
.mtbl{width:100%;border-collapse:collapse;font-size:11px;}
.mtbl th{background:var(--dark3);padding:5px 5px;text-align:center;
  font-size:9px;font-weight:700;color:var(--grey);}
.mtbl th.rh{text-align:left;color:var(--white);font-size:10px;}
.mtbl td{padding:5px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.03);}
.mtbl tr:last-child td{border-bottom:none;}
.mc-y{background:rgba(39,174,96,0.2);color:var(--green);font-weight:700;
  border-radius:4px;font-size:10px;padding:1px 4px;}
.mc-hi{background:rgba(201,150,10,0.2);color:var(--gold);font-weight:700;
  border-radius:4px;font-size:10px;padding:1px 4px;}
.mc-n{color:rgba(255,255,255,0.15);font-size:10px;}

/* Password screen */
.pwb{background:var(--dark2);border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;padding:24px;max-width:320px;margin:32px auto;}
.pwb h2{font-family:var(--display);font-size:22px;margin-bottom:7px;}
.pwb p{font-size:12px;color:var(--grey);margin-bottom:18px;}
.pwin{width:100%;background:var(--dark3);border:1.5px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:12px 14px;color:white;font-size:16px;
  font-family:var(--font);margin-bottom:10px;min-height:var(--touch);}
.pwin:focus{outline:none;border-color:var(--gold);}
.pwbtn{width:100%;background:var(--gold);border:none;border-radius:10px;
  padding:14px;color:var(--dark);font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--font);min-height:var(--touch);}
.rstbtn{display:block;width:100%;margin-top:7px;background:transparent;
  border:1.5px solid rgba(255,0,0,0.25);border-radius:10px;padding:11px;
  color:var(--rot-m);font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font);text-align:center;min-height:var(--touch);}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.view.on{animation:fadeUp 0.2s ease;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.55;}}
.ld{display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--green);animation:pulse 1.4s infinite;margin-right:3px;}
@keyframes shimmer{0%{opacity:0.6;}50%{opacity:1;}100%{opacity:0.6;}}

/* Toast */
/* Eagle/Birdie Celebration */

.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  background:rgba(22,27,34,0.97);color:white;padding:10px 20px;
  border-radius:20px;font-size:13px;font-weight:600;z-index:9999;
  opacity:0;transition:opacity 0.25s;pointer-events:none;
  white-space:nowrap;backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.toast.show{opacity:1;}

/* Modus-Auswahl Buttons (Spieler/Zuschauer) */
.mode-btn{width:100%;border:3.5px solid rgba(255,255,255,0.2);border-radius:18px;
  padding:22px 16px;cursor:pointer;font-family:var(--font);
  display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,0.1);transition:all 0.2s;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.mode-btn:active{transform:scale(0.97);}
.player-btn-mode{
  border-color:#C9960A;
  background:rgba(201,150,10,0.2);
  box-shadow:0 4px 24px rgba(201,150,10,0.35);}
.player-btn-mode:active{background:rgba(201,150,10,0.3);}
.guest-btn-mode{
  border-color:rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.1);
  box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.guest-btn-mode:active{background:rgba(255,255,255,0.18);}
.mode-btn-title{font-family:var(--display);font-size:24px;letter-spacing:2px;color:var(--white);margin-bottom:4px;}
.mode-btn-sub{font-size:12px;color:var(--grey-l);}
.back-sp-btn{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);
  border-radius:10px;padding:8px 14px;color:var(--white);font-size:13px;
  cursor:pointer;font-family:var(--font);flex-shrink:0;}

/* Team selection buttons on splash */
.team-btn{width:100%;border:3.5px solid rgba(255,255,255,0.2);border-radius:18px;
  padding:22px 12px;cursor:pointer;font-family:var(--font);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:all 0.2s;background:rgba(255,255,255,0.08);
  box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.team-btn:active{transform:scale(0.96);}
.rot-btn{border-color:var(--rot-m);background:rgba(192,57,43,0.22);
  box-shadow:0 4px 24px rgba(192,57,43,0.35);}
.rot-btn:active{background:rgba(192,57,43,0.32);}
.blau-btn{border-color:var(--blau-m);background:rgba(41,128,185,0.22);
  box-shadow:0 4px 24px rgba(41,128,185,0.35);}
.blau-btn:active{background:rgba(41,128,185,0.32);}
.team-btn-dot{width:16px;height:16px;border-radius:50%;}
.rot-dot{background:var(--rot-m);box-shadow:0 0 14px rgba(231,76,60,0.7);}
.blau-dot{background:var(--blau-m);box-shadow:0 0 14px rgba(41,128,185,0.7);}
.team-btn-name{font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--white);}
.team-btn-sub{font-size:11px;color:var(--grey);font-family:var(--mono);}

/* Stableford 2v2 Karten-Layout */
.stbl-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stbl-team-col{display:flex;flex-direction:column;gap:6px;}
.stbl-card{background:var(--dark3);border-radius:10px;padding:10px;border:2px solid rgba(255,255,255,0.15);}
.stbl-card.rb{border-color:rgba(192,57,43,0.4);background:rgba(192,57,43,0.06);}
.stbl-card.bb{border-color:rgba(41,128,185,0.4);background:rgba(41,128,185,0.06);}
.stbl-card-name{font-size:12px;font-weight:700;color:var(--white);margin-bottom:7px;letter-spacing:0.3px;}
.stbl-card-inp{display:flex;align-items:center;justify-content:center;
  background:var(--dark2);border-radius:8px;overflow:visible;border:1.5px solid rgba(255,255,255,0.08);}
.stbl-card.rb .stbl-card-inp{border-color:rgba(192,57,43,0.4);}
.stbl-card.bb .stbl-card-inp{border-color:rgba(41,128,185,0.4);}
.stbl-card-inp .scbtn{width:44px;height:48px;font-size:24px;}
.stbl-card-inp .scv{font-size:20px;min-width:40px;line-height:48px;font-weight:700;}

@media print {
  body > *:not(#print-spielplan):not(#print-ergebnisse) { display: none !important; }
  #print-ergebnisse { display: none; }
  body { margin: 0; padding: 0; background: white; }
  #print-spielplan {
    display: block !important;
    width: 100%;
    background: white;
    color: black;
    font-family: Arial, sans-serif;
    font-size: 12px;
  }
  .ps-page1 { padding: 20px; }
  .ps-page2 { padding: 20px; page-break-before: always; }
  .ps-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .ps-sub { font-size: 12px; color: #666; margin-bottom: 16px; }
  .ps-day { font-size: 15px; font-weight: 700; margin: 14px 0 6px; border-bottom: 2px solid #333; padding-bottom: 4px; }
  .ps-group-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #888; margin: 8px 0 4px; }
  .ps-match { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 12px; }
  .ps-match-teams { flex: 1; }
  .ps-rot { color: #c0392b; font-weight: 600; }
  .ps-blau { color: #1a5fa8; font-weight: 600; }
  .ps-vs { color: #999; margin: 0 6px; }
  .ps-vorg { font-size: 11px; font-weight: 700; margin-left: 6px; border-radius: 4px; padding: 1px 5px; }
  .ps-vorg-rot { color: #c0392b; background: rgba(192,57,43,0.1); }
  .ps-vorg-blau { color: #1a5fa8; background: rgba(26,95,168,0.1); }
  .ps-info { font-size: 10px; color: #888; margin-left: auto; white-space: nowrap; padding-left: 10px; }
  .ps-footer { margin-top: 20px; font-size: 10px; color: #aaa; text-align: center; }
  .ps-mtx-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .ps-mtx-sub { font-size: 11px; color: #666; margin-bottom: 16px; }
  .ps-mtx table { border-collapse: collapse; width: 100%; }
  .ps-mtx th, .ps-mtx td { border: 1px solid #ccc; padding: 7px 12px; text-align: center; font-size: 12px; }
  .ps-mtx th.row-hdr { text-align: left; color: #c0392b; font-weight: 700; background: #fdf2f2; }
  .ps-mtx th.col-hdr { color: #1a5fa8; font-weight: 700; background: #f0f5ff; }
  .ps-mtx td.cell-team { background: #f5f5f5; color: #333; font-weight: 600; }
  .ps-mtx td.cell-einzel { background: #fff8e1; color: #b7770d; font-weight: 700; border: 2px solid #f0c040; }
  .ps-einzel-title { font-size: 15px; font-weight: 700; margin: 20px 0 8px; }
  .ps-einzel-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 12px; }
  .ps-einzel-num { width: 20px; color: #999; font-size: 11px; }

  /* Ergebnis-PDF */
  .pe-page { padding: 20px; }
  .pe-page + .pe-page { page-break-before: always; }
  .pe-title { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .pe-sub { font-size: 12px; color: #666; margin-bottom: 16px; }
  .pe-day-hdr { font-size: 16px; font-weight: 700; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px; }
  .pe-day-score { display: flex; align-items: center; justify-content: center; gap: 16px; background: #f8f8f8; border-radius: 8px; padding: 10px; margin-bottom: 14px; }
  .pe-day-rot { font-size: 20px; font-weight: 700; color: #c0392b; }
  .pe-day-blau { font-size: 20px; font-weight: 700; color: #1a5fa8; }
  .pe-day-sep { font-size: 18px; color: #999; }
  .pe-group-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #888; margin: 10px 0 4px; border-top: 1px solid #eee; padding-top: 8px; }
  .pe-match { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; gap: 6px; }
  .pe-teams { flex: 1; }
  .pe-rot { color: #c0392b; font-weight: 600; }
  .pe-blau { color: #1a5fa8; font-weight: 600; }
  .pe-vs { color: #bbb; margin: 0 4px; font-size: 10px; }
  .pe-result { font-size: 11px; font-weight: 700; min-width: 60px; text-align: right; }
  .pe-result-rot { color: #c0392b; }
  .pe-result-blau { color: #1a5fa8; }
  .pe-result-tie { color: #b7770d; }
  .pe-result-open { color: #aaa; }
  .pe-pts { font-size: 11px; color: #888; min-width: 40px; text-align: right; }
  .pe-ntp-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 11px; }
  .pe-ntp-lbl { flex: 1; color: #555; }
  .pe-total-box { background: #1a1a2e; color: white; border-radius: 10px; padding: 16px; margin: 14px 0; display: flex; align-items: center; justify-content: space-around; }
  .pe-total-rot { font-size: 28px; font-weight: 700; color: #e74c3c; text-align: center; }
  .pe-total-blau { font-size: 28px; font-weight: 700; color: #3498db; text-align: center; }
  .pe-total-lbl { font-size: 10px; color: #aaa; margin-top: 2px; }

<script>
(function(){
  var DB = 'https://the-cup-2026-default-rtdb.europe-west1.firebasedatabase.app';
  var PATH = '/cup2026';
  var KEYS = ['c26s','c26r','c26ntp','c26m','c26e','c26t','c26p'];
  var isSyncing = false;
  var lastPush = 0;
  var evtSource = null;

  // ── PUSH: lokale Daten → Firebase ────────────────────────
  window.fbPush = function() {
    if(isSyncing) return;
    var now = Date.now();
    if(now - lastPush < 500) return; // debounce 500ms
    lastPush = now;
    var data = {};
    KEYS.forEach(function(k){
      var v = localStorage.getItem(k);
      if(v) data[k] = v;
    });
    fetch(DB + PATH + '.json', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    }).then(function(r){
      setSyncDot(r.ok ? 'green' : 'orange');
    }).catch(function(){
      setSyncDot('orange');
    });
  };

  // ── APPLY: Firebase Daten → lokal ────────────────────────
  function applyRemote(data) {
    if(!data || isSyncing) return;
    isSyncing = true;
    var changed = false;
    KEYS.forEach(function(k){
      if(data[k] && data[k] !== localStorage.getItem(k)){
        localStorage.setItem(k, data[k]);
        changed = true;
      }
    });
    isSyncing = false;
    if(changed && typeof loadData === 'function'){
      loadData();
      recalcAll();
      renderSB();
      if(typeof renderSC==='function') renderSC();
      if(typeof renderSP==='function') renderSP();
      showToast('🔄 Sync');
    }
  }

  // ── REALTIME: Firebase Server-Sent Events ─────────────────
  function startStream() {
    if(evtSource) evtSource.close();
    try {
      evtSource = new EventSource(DB + PATH + '.json?accept=text/event-stream');
      evtSource.addEventListener('put', function(e) {
        try {
          var msg = JSON.parse(e.data);
          if(msg && msg.data) applyRemote(msg.data);
          setSyncDot('green');
        } catch(err) {}
      });
      evtSource.onopen = function() { setSyncDot('green'); };
      evtSource.onerror = function() {
        setSyncDot('orange');
        // Retry after 5s
        setTimeout(startStream, 5000);
      };
    } catch(e) {
      setSyncDot('orange');
      // Fallback: poll every 10s
      setInterval(pollFirebase, 10000);
    }
  }

  // ── FALLBACK: Polling ──────────────────────────────────────
  function pollFirebase() {
    if(isSyncing) return;
    fetch(DB + PATH + '.json')
      .then(function(r){ return r.json(); })
      .then(function(data){ applyRemote(data); setSyncDot('green'); })
      .catch(function(){ setSyncDot('orange'); });
  }

  // ── STATUS DOT ─────────────────────────────────────────────
  function setSyncDot(color) {
    var dot = document.getElementById('sync-dot');
    var colors = {green:'#27AE60', orange:'#E67E22', grey:'#8B949E'};
    if(dot) dot.style.background = colors[color] || colors.grey;
    var st = document.getElementById('fb-status');
    if(st) st.textContent = color==='green' ? '🟢 Live verbunden' : '🔴 Offline';
  }

  // ── START ──────────────────────────────────────────────────
  // Wait for DOM + app to be ready
  window.addEventListener('load', function() {
    setTimeout(function() {
      startStream();
      setSyncDot('grey');
    }, 1000);
  });

  console.log('Firebase REST Sync bereit ✓');
})();
</script>

function wxEmoji(s){
  if(!s)return'🌡️';
  if(s.includes('clearsky'))return'☀️';
  if(s.includes('fair'))return'🌤️';
  if(s.includes('partlycloudy'))return'⛅';

  if(s.includes('thunder'))return'⛈️';
  if(s.includes('heavyrain'))return'🌧️';

function wxDayDate(dayName){
  const map={Donnerstag:4,Freitag:5,Samstag:6};
  const target=map[dayName];if(target===undefined)return null;
  const d=new Date();let diff=target-d.getDay();if(diff<0)diff+=7;
  d.setDate(d.getDate()+diff);return d;
}
function wxForDate(ts,date,hour){
  const ymd=date.toISOString().slice(0,10);
  const same=ts.filter(t=>t.time.startsWith(ymd));if(!same.length)return null;
  if(hour!==undefined){
    const hh=String(hour).padStart(2,'0');
    return same.find(t=>t.time.includes('T'+hh+':00'))||same.find(t=>t.time.includes('T12:00'))||same[0];
  }
  return same.find(t=>t.time.includes('T12:00'))||same.find(t=>t.time.includes('T11:00'))||same.find(t=>t.time.includes('T13:00'))||same[0];
}

      {headers:{'User-Agent':'TheCup2026/1.0 golf-app'}});

}

  const data=await fetchWx();if(!data)return;

    var date=wxDayDate(day);if(!date)return;

    var ttHour=ttObj&&ttObj.t1?parseInt(ttObj.t1.split(':')[0],10):undefined;
    var entry=wxForDate(ts,date,ttHour);if(!entry)return;
    var d=entry.data;if(!d)return;
    var temp=d.instant&&d.instant.details&&d.instant.details.air_temperature;
    var symbol=(d.next_1_hours&&d.next_1_hours.summary&&d.next_1_hours.summary.symbol_code)

function allP(){return[...PL.rot,...PL.blau];}
function getTeam(n){return PL.rot.find(x=>x.n===n)?'rot':'blau';}
function getHcp(n){const p=allP().find(x=>x.n===n);return p?p.hcp:0;}
function cd(m){return COURSES[m.ckey||'OLD'];}
function getTee(ckey){const k=TEES[ckey]||Object.keys(COURSES[ckey].tees)[0];return{key:k,...COURSES[ckey].tees[k]};}
// WHS formula: Math.round(HCP * SR/113 + (CR-Par))
function courseHcp(hcpi,ckey){const t=getTee(ckey);return Math.round(hcpi*t.sr/113+(t.cr-t.par));}
function getHoleIdx(m){
  const c=cd(m);const tot=c.holes;
  if(m.nine==='back'&&tot===18)return Array.from({length:9},(_,i)=>i+9);
  if(m.nine==='front'||m.nine==='9')return Array.from({length:9},(_,i)=>i);
  return Array.from({length:m.holes||tot},(_,i)=>i);
}
function playerStrokes(name,ckey,hi){
  const c=COURSES[ckey];const chcp18=courseHcp(getHcp(name),ckey);const n=hi.length;
  // Bei 9 Löchern: CourseHCP halbieren (WHS Standard: aufrunden bei .5)
  const chcp=n<18?Math.floor(chcp18/2+0.5):chcp18;
  const res={};
  hi.forEach(h=>{const vg=c.vorg[h];res[h]=(vg<=chcp?1:0)+(vg<=(chcp-n)?1:0);});
  return res;
}
function teamStrokes(m){
  const c=cd(m);const hi=getHoleIdx(m);const n=hi.length;
  // Bei 9 Löchern: CourseHCP halbieren (WHS Standard)
  const adjHcp=function(chcp18){return n<18?Math.floor(chcp18/2+0.5):chcp18;};
  const isEinzel=m.type==='einzel';
  const isBBtype=m.type==='bb'||m.type==='greensome'; // Dübler: reiner Par3-Platz, keine Extraschläge
  const chcpA=m.pA.map(p=>adjHcp(courseHcp(getHcp(p),m.ckey)));
  const chcpB=m.pB.map(p=>adjHcp(courseHcp(getHcp(p),m.ckey)));
  const avgA=chcpA.reduce((a,b)=>a+b,0)/chcpA.length;
  const avgB=chcpB.reduce((a,b)=>a+b,0)/chcpB.length;
  const isDuebler=m.type==='duebler';
  const diff=isDuebler?0:isEinzel
    ? Math.abs(Math.round(avgA)-Math.round(avgB))
    : Math.round(Math.abs(avgA-avgB)*0.75);
  const weakerIsA=avgA>avgB;
  // Löcher nach Vorgabe sortieren (härteste zuerst)
  const sorted=[...hi].sort((a,b)=>c.vorg[a]-c.vorg[b]);
  let sh;
  if(isBBtype){
    // BB/Greensome: keine Extraschläge auf Par-3, Schlag auf nächstes Par-4/5 verschieben
    sh=new Set();
    let count=0;
    for(let i=0;i<sorted.length&&count<diff;i++){
      const h=sorted[i];
      if(c.par[h]===3){
        // Par-3: überspringen, suche nächstes Nicht-Par-3 in der Reihenfolge
        // (wird automatisch in nächster Iteration gefunden)
        continue;
      }
      sh.add(h);count++;
    }
  }else{
    // Einzel: Standard WHS (auch Par-3 bekommt Schläge)
    sh=new Set(sorted.slice(0,diff));
  }
  const ph={};hi.forEach(h=>{ph[h]=sh.has(h)?(weakerIsA?1:-1):0;});
  return{diff,weakerIsA,avgA:+avgA.toFixed(1),avgB:+avgB.toFixed(1),ph};
}
function stblPts(g,par,s){return Math.max(0,2+par-g+s);}
function scCls(g,par,s){const d=par-(g-s);if(d>=2)return'eagle';if(d===1)return'birdie';if(d===0)return'par';if(d===-1)return'bogey';if(d===-2)return'double';return'worse';}
function fmt(v){return Number(v||0).toFixed(1);}
// ─── NTP HELPERS (Round-based) ─────────────────────────────
// NTP gilt pro Runde (Tag+Typ), nicht pro einzelnem Match
// Nicht gültig für: einzel, duebler
const NTP_EXCL_TYPES=['einzel','duebler'];

function ntpRoundsForMatch(m){
  // Returns NTP rounds that apply to this match
  if(NTP_EXCL_TYPES.includes(m.type))return[];
  if(!EXTRAS.ntp.enabled||!EXTRAS.ntp.rounds)return[];
  return (EXTRAS.ntp.rounds||[]).filter(function(r){
    return r.day===m.day && r.types.includes(m.type);
  });
}

function getNtpMatchWin(roundId,matchId){
  // Who won NTP for a specific match in a round
  var d=ntpR[roundId];if(!d||!d[matchId])return null;
  var r=parseFloat(d[matchId].rot)||Infinity;
  var b=parseFloat(d[matchId].blau)||Infinity;
  if(r===Infinity&&b===Infinity)return null;
  if(r<b)return'rot';if(b<r)return'blau';return'tie';
}

function getNtpRoundWin(roundId){
  // Who won overall in a round: closest single distance wins
  // (best/closest distance per team across all matches in round)
  var d=ntpR[roundId];if(!d)return null;
  var bestRot=Infinity,bestBlau=Infinity;
  Object.values(d).forEach(function(md){
    var r=parseFloat(md.rot)||Infinity;
    var b=parseFloat(md.blau)||Infinity;
    if(r<bestRot)bestRot=r;
    if(b<bestBlau)bestBlau=b;
  });
  if(bestRot===Infinity&&bestBlau===Infinity)return null;
  if(bestRot<bestBlau)return'rot';
  if(bestBlau<bestRot)return'blau';
  return'tie';
}

function getNtpPts(){
  var p={rot:0,blau:0};
  if(!EXTRAS.ntp.enabled||!EXTRAS.ntp.rounds)return p;
  EXTRAS.ntp.rounds.forEach(function(r){
    var w=getNtpRoundWin(r.id);
    if(w==='rot')p.rot+=EXTRAS.ntp.pts;
    else if(w==='blau')p.blau+=EXTRAS.ntp.pts;
    else if(w==='tie'){p.rot+=EXTRAS.ntp.pts/2;p.blau+=EXTRAS.ntp.pts/2;}
  });
  return p;
}

function recalcM(m){
  const s=scores[m.id];if(!s)return;
  const c=cd(m);const hi=getHoleIdx(m);
  const isBB=m.type==='bb'||m.type==='duebler'||m.type==='greensome';const isStabl=m.type==='stabl';
  // For BB/Dübler: 1 team score (__A/__B). For Stableford/Einzel: individual per player
  const kA=isBB?'__A':m.pA[0];const kB=isBB?'__B':m.pB[0];
  if(isStabl){
    // 2v2 Stableford: alle pA-Spieler kombiniert vs alle pB-Spieler kombiniert
    const strokesA=m.pA.map(p=>playerStrokes(p,m.ckey,hi));
    const strokesB=m.pB.map(p=>playerStrokes(p,m.ckey,hi));
    let ptA=0,ptB=0,hp=0;
    hi.forEach(h=>{
      const hd=s[h]||{};
      const allFilled=m.pA.every(p=>hd[p]>0)&&m.pB.every(p=>hd[p]>0);
      if(!allFilled)return;hp++;
      ptA+=m.pA.reduce((sum,p,i)=>sum+stblPts(hd[p],c.par[h],strokesA[i][h]||0),0);
      ptB+=m.pB.reduce((sum,p,i)=>sum+stblPts(hd[p],c.par[h],strokesB[i][h]||0),0);
    });
    let rP=0,bP=0;if(hp===hi.length){const rR=m.tA==='rot'?ptA:ptB;const bR=m.tA==='rot'?ptB:ptA;if(rR>bR)rP=1;else if(bR>rR)bP=1;else{rP=0.5;bP=0.5;}}
    results[m.id]={rotUP:m.tA==='rot'?ptA:ptB,blauUP:m.tA==='rot'?ptB:ptA,holesPlayed:hp,rotPts:rP,blauPts:bP,preset:false,isStabl:true};return;
  }
  const ts=teamStrokes(m);let rUP=0,bUP=0,hp=0;
  hi.forEach(h=>{const hd=s[h]||{};if(!(hd[kA]>0)||!(hd[kB]>0))return;hp++;const t=ts.ph[h]||0;const nA=hd[kA]-(t>0?t:0);const nB=hd[kB]-(t<0?Math.abs(t):0);const tAr=m.tA==='rot';if(nA<nB){if(tAr)rUP++;else bUP++;}else if(nB<nA){if(tAr)bUP++;else rUP++;}});
  const hl=hi.length-hp;let rP=0,bP=0;if(hl===0||Math.abs(rUP-bUP)>hl){if(rUP>bUP)rP=1;else if(bUP>rUP)bP=1;else{rP=0.5;bP=0.5;}}
  results[m.id]={rotUP:rUP,blauUP:bUP,holesPlayed:hp,rotPts:rP,blauPts:bP,preset:false};
}
function recalcAll(){MATCHES.forEach(m=>{if(scores[m.id])recalcM(m);});}
function getTotals(){let r=0,b=0;MATCHES.forEach(m=>{const x=results[m.id];if(x){r+=x.rotPts||0;b+=x.blauPts||0;}});const n=getNtpPts();return{rot:r+n.rot,blau:b+n.blau,rotBase:r,blauBase:b,rotNtp:n.rot,blauNtp:n.blau};}

function getMaxPts(){
  // Total possible points = all matches + all NTP rounds
  // Each match = 1 point (split or full)
  var matchPts=MATCHES.length; // 1 pt per match
  // NTP: each active round = pts (split between winner/loser)
  var ntpPts=EXTRAS.ntp.enabled?(EXTRAS.ntp.rounds||[]).length*EXTRAS.ntp.pts:0;
  var total=matchPts+ntpPts;
  var winAt=total/2;
  return{total:total,winAt:winAt};
}
function getPTot(){
  const t={};allP().forEach(p=>t[p.n]=0);
  MATCHES.forEach(m=>{const r=results[m.id];if(!r)return;const tAr=m.tA==='rot';const pA=(tAr?r.rotPts||0:r.blauPts||0)/m.pA.length;const pB=(tAr?r.blauPts||0:r.rotPts||0)/m.pB.length;m.pA.forEach(p=>t[p]=(t[p]||0)+pA);m.pB.forEach(p=>t[p]=(t[p]||0)+pB);});
  if(EXTRAS.ntp.enabled){
    (EXTRAS.ntp.rounds||[]).forEach(function(r){
      var w=getNtpRoundWin(r.id);var pts=EXTRAS.ntp.pts;
      var roundMs=MATCHES.filter(function(m){return m.day===r.day&&r.types.includes(m.type);});
      var rP=[],bP=[];
      roundMs.forEach(function(m){m.pA.concat(m.pB).forEach(function(p){
        if(getTeam(p)==='rot'&&!rP.includes(p))rP.push(p);
        else if(getTeam(p)==='blau'&&!bP.includes(p))bP.push(p);
      });});
      if(w==='rot'&&rP.length)rP.forEach(function(p){t[p]=(t[p]||0)+pts/rP.length;});
      else if(w==='blau'&&bP.length)bP.forEach(function(p){t[p]=(t[p]||0)+pts/bP.length;});
      else if(w==='tie'){rP.forEach(function(p){t[p]=(t[p]||0)+pts/2/rP.length;});bP.forEach(function(p){t[p]=(t[p]||0)+pts/2/bP.length;});}
    });
  }
  return t;
}

    const done=isStabl2v2?m.pA.every(p=>hd[p]>0)&&m.pB.every(p=>hd[p]>0):(vA>0&&vB>0);
    const ntpG2=ntpByH[h];
    let sd='';

    else if(stA){const sA2=stA[h]||0,sB2=stB[h]||0;
      const la=sA2>0?`<span style="color:${m.tA==='rot'?'var(--rot-m)':'var(--blau-m)'}">${'+'+sA2} ●</span>`:'';
      const lb=sB2>0?`<span style="color:${m.tB==='rot'?'var(--rot-m)':'var(--blau-m)'}">${'+'+sB2} ●</span>`:'';
      if(la||lb)sd=`<div class="lstrok">${la}${la&&lb?'<br>':''}${lb}</div>`;}
    else if(tsEz){const t=tsEz.ph[h]||0;if(t!==0)sd=`<div class="lstrok" style="color:${t>0?(m.tA==='rot'?'var(--rot-m)':'var(--blau-m)'):(m.tB==='rot'?'var(--rot-m)':'var(--blau-m)')}">${Math.abs(t)>0?'+'+Math.abs(t):''} <span style="font-size:9px">●</span></div>`;}
    const stFA=isBB?((ts?.ph[h]||0)>0?Math.abs(ts.ph[h]||0):0):(stA?stA[h]||0:(tsEz?((tsEz.ph[h]||0)>0?Math.abs(tsEz.ph[h]||0):0):0));
    const stFB=isBB?((ts?.ph[h]||0)<0?Math.abs(ts.ph[h]||0):0):(stB?stB[h]||0:(tsEz?((tsEz.ph[h]||0)<0?Math.abs(tsEz.ph[h]||0):0):0));
    // Build inputs - either 2 (BB/Einzel) or 4 (2v2 Stableford)

      var mkCard=function(mid2,hole2,pName2,teamCls2,strokH2,holeData2){

          +'<div class="stbl-card-name">'+pName2+stkBadge2+'</div>'
          +'<div class="stbl-card-inp">'
          +'<button class="scbtn" data-mid="'+mid2+'" data-h="'+hole2+'" data-pn="'+pName2+'" ontouchstart="tap(this)" onclick="chSp(this.dataset.mid,+this.dataset.h,this.dataset.pn,-1)">−</button>'
          +'<div class="scv '+cls2+'" id="'+pid2+'">'+( v2||'0')+'</div>'
          +'<button class="scbtn" data-mid="'+mid2+'" data-h="'+hole2+'" data-pn="'+pName2+'" ontouchstart="tap(this)" onclick="chSp(this.dataset.mid,+this.dataset.h,this.dataset.pn,1)">+</button>'

    }else{
      const clsA=vA>0?scCls(vA,par,stFA):'';const clsB=vB>0?scCls(vB,par,stFB):'';

      rows+='<div class="ntp-row">'

        +'<span class="ntp-unit">cm</span>'

        +'<div class="ntp-team blau-t">'

        +'</div>';

  });
  let hdr=`<div>L</div><div>Par</div><div style="font-size:8px">Vg</div><div></div><div></div>`;
  if(isStabl2v2){
    m.pA.forEach(p=>hdr+=`<div style="text-align:center;font-size:9px;color:${m.tA==='rot'?'var(--rot-m)':'var(--blau-m)'}">${p.slice(0,4)}</div>`);
    m.pB.forEach(p=>hdr+=`<div style="text-align:center;font-size:9px;color:${m.tB==='rot'?'var(--rot-m)':'var(--blau-m)'}">${p.slice(0,4)}</div>`);

function saveNtpMC(el){
  var rid=el.dataset.rid,mid=el.dataset.mid,team=el.dataset.team;
  var mEl=document.getElementById('ntp-m-'+rid+'-'+mid+'-'+team);
  var cmEl=document.getElementById('ntp-cm-'+rid+'-'+mid+'-'+team);
  var meters=parseFloat((mEl&&mEl.value))||0;
  var cms=parseFloat((cmEl&&cmEl.value))||0;
  var total=meters*100+cms;
  saveNtp(rid,mid,team,total);
  updateNtpWinEl(rid,mid);
}
function toggleNtpRoundEl(el){
  toggleNtpRound(el.dataset.key,parseInt(el.dataset.slot),el.checked,
    document.getElementById('ntp-hole-'+el.dataset.key+'-'+el.dataset.slot).value);
}
function changeNtpHoleEl(el){
  changeNtpHole(el.dataset.key,parseInt(el.dataset.slot),el.value);
}
function saveNtp(roundId,matchId,team,val){
  if(!ntpR[roundId])ntpR[roundId]={};
  if(!ntpR[roundId][matchId])ntpR[roundId][matchId]={};
  ntpR[roundId][matchId][team]=parseFloat(val)||0;
  saveData();renderSB();
}
function updateNtpWinEl(rid,mid){
  // Runden-Gewinner anzeigen (nicht Match-spezifisch)

function cmToMC(totalCm){
  var t=Math.round(totalCm||0);
  return{m:Math.floor(t/100),cm:t%100};
}
function chS(mid,h,key,d2){
  if(curP==='Zuschauer'||!curP)return;
  if(_tapActive){_tapActive=false;}else if(event&&event.type==='click'&&'ontouchstart' in window)return;
  if(!scores[mid])scores[mid]={};if(!scores[mid][h])scores[mid][h]={};
  const m=MATCHES.find(x=>x.id===mid);const c=cd(m);const hi=getHoleIdx(m);
  const prevV=scores[mid][h][key]||0;
  const nv=Math.max(1,Math.min(15,prevV+d2));
  if(prevV===0&&d2<0)return;
  scores[mid][h][key]=nv;
  const side=key==='__A'||key===m.pA[0]?'A':'B';
  const el=document.getElementById(`sv-${mid}-${h}-${side}`);
  if(el){el.textContent=nv;
    const isBB2=m.type==='bb'||m.type==='duebler'||m.type==='greensome';
    const isEz2=m.type==='einzel';
    let stk=0;
    if(isBB2||isEz2){const ts2=teamStrokes(m);const t=ts2.ph[h]||0;stk=side==='A'?Math.max(0,t):Math.max(0,-t);}
    else{const strok=side==='A'?playerStrokes(m.pA[0],m.ckey,hi):playerStrokes(m.pB[0],m.ckey,hi);stk=strok[h]||0;}
    const newCls=scCls(nv,c.par[h],stk);
    el.className=`scv ${newCls}`;

  }
  recalcM(m);saveData();const x=results[mid]||{};let stxt='TIE',scls='tie';
  if(m.type==='stabl'){const ru=x.rotUP||0,bu=x.blauUP||0;if(ru>bu){stxt=`🔴${ru}P`;scls='rl';}else if(bu>ru){stxt=`🔵${bu}P`;scls='bl';}}
  else{const ru=x.rotUP||0,bu=x.blauUP||0;if(ru>bu){stxt=`${ru-bu} UP`;scls='rl';}else if(bu>ru){stxt=`${bu-ru} UP`;scls='bl';}}
  const ls=document.getElementById('lst');if(ls){ls.textContent=stxt;ls.className=`stx ${scls}`;}
  const lru=document.getElementById('lru');const lbu=document.getElementById('lbu');
  if(lru)lru.textContent=x.rotUP||0;if(lbu)lbu.textContent=x.blauUP||0;
  // Stand-Badge für dieses Loch live aktualisieren
  const hrEl=document.getElementById('hr-'+mid+'-'+h);
  if(hrEl&&(m.type==='bb'||m.type==='duebler'||m.type==='greensome'||m.type==='einzel')){
    const ts3=teamStrokes(m);const hi3=getHoleIdx(m);const c3=cd(m);
    const hd3=scores[mid][h]||{};
    const vA3=hd3[m.type==='bb'||m.type==='duebler'||m.type==='greensome'?'__A':m.pA[0]]||0;
    const vB3=hd3[m.type==='bb'||m.type==='duebler'||m.type==='greensome'?'__B':m.pB[0]]||0;
    if(vA3>0&&vB3>0){
      const tH3=ts3.ph[h]||0;
      const nA3=vA3-(tH3>0?tH3:0);const nB3=vB3-(tH3<0?Math.abs(tH3):0);
      const tAr3=m.tA==='rot';
      let cls3='tie',txt3='TIE';
      if(nA3<nB3){cls3=tAr3?'rl':'bl';txt3=tAr3?'🔴':'🔵';}
      else if(nB3<nA3){cls3=tAr3?'bl':'rl';txt3=tAr3?'🔵':'🔴';}
      hrEl.className='hr '+cls3;hrEl.textContent=txt3;
    }else{hrEl.className='hr';hrEl.textContent='—';}
  }
  renderSB();
}
// chSp: change score for a named player (2v2 stableford)
function chSp(mid,h,pName,d2){
  if(curP==='Zuschauer'||!curP)return;
  if(_tapActive){_tapActive=false;}else if(event&&event.type==='click'&&'ontouchstart' in window)return;
  if(!scores[mid])scores[mid]={};if(!scores[mid][h])scores[mid][h]={};
  const m=MATCHES.find(x=>x.id===mid);const c=cd(m);const hi=getHoleIdx(m);
  const prevVp=scores[mid][h][pName]||0;
  const nv=Math.max(1,Math.min(15,prevVp+d2));
  if(prevVp===0&&d2<0)return;
  scores[mid][h][pName]=nv;
  const safeN=pName.replace(/[^a-zA-Z0-9]/g,'_');
  // Score-Anzeige aktualisieren
  const el=document.getElementById('sv-'+mid+'-'+h+'-'+safeN);
  if(el){
    const strok=playerStrokes(pName,m.ckey,hi);
    const spCls=scCls(nv,c.par[h],strok[h]||0);
    el.textContent=nv;el.className='scv '+spCls;

  }
  // Stableford-Punkte Badge sofort aktualisieren
  const ptsBadgeEl=document.getElementById('sp-'+mid+'-'+h+'-'+safeN);
  if(ptsBadgeEl){
    const strok2=playerStrokes(pName,m.ckey,hi);
    const pts=stblPts(nv,c.par[h],strok2[h]||0);
    ptsBadgeEl.textContent=pts+'P';
    ptsBadgeEl.parentElement.style.display='';
  }
  recalcM(m);saveData();
  const x=results[mid]||{};
  const lru2=document.getElementById('lru');const lbu2=document.getElementById('lbu');
  if(lru2)lru2.textContent=(x.rotUP||0)+'P';
  if(lbu2)lbu2.textContent=(x.blauUP||0)+'P';
  renderSB();
}

function savP(){
  // Validierung: keine doppelten Namen
  var allNames=[];
  var dupFound=false;
  ['rot','blau'].forEach(function(t){
    PL[t].forEach(function(p,i){
      var nE=document.getElementById('pn-'+t+'-'+i);
      var nn=nE?nE.value.trim():p.n;
      if(allNames.includes(nn)){showToast('⚠ Name "'+nn+'" doppelt!');dupFound=true;}
      allNames.push(nn);
    });
  });
  if(dupFound)return;

  ['rot','blau'].forEach(function(t){
    PL[t].forEach(function(p,i){
      const nE=document.getElementById('pn-'+t+'-'+i);
      const hE=document.getElementById('ph-'+t+'-'+i);
      if(nE&&nE.value.trim()){
        const o=p.n, nn=nE.value.trim();
        if(o!==nn){
          // Nur in den richtigen Seiten umbenennen:
          // Rot-Spieler stehen in pA wenn tA='rot', sonst in pB
          // Blau-Spieler stehen in pA wenn tA='blau', sonst in pB
          MATCHES.forEach(function(m){
            if(t==='rot'){
              if(m.tA==='rot') m.pA=m.pA.map(function(n){return n===o?nn:n;});
              else             m.pB=m.pB.map(function(n){return n===o?nn:n;});
            } else {
              if(m.tA==='blau') m.pA=m.pA.map(function(n){return n===o?nn:n;});
              else              m.pB=m.pB.map(function(n){return n===o?nn:n;});
            }
          });
        }
        p.n=nn;
        if(hE)p.hcp=Math.max(0,Math.min(54,parseInt(hE.value)||0));
      }
    });
  });
  saveData();recalcAll();renderSB();renderSP();buildSplash();showToast('Spieler gespeichert ✓');renderAdm();
}

function savM(id){
  const m=MATCHES.find(x=>x.id===id);if(!m)return;
  const fv=document.getElementById('mf-'+id).value;const fo=FMT_OPTS.find(f=>f.v===fv)||FMT_OPTS[0];
  const pA=Array.from(document.getElementById('mpa-'+id).selectedOptions).map(function(o){return o.value;});
  const pB=Array.from(document.getElementById('mpb-'+id).selectedOptions).map(function(o){return o.value;});
  if(!pA.length||!pB.length){showToast('Min. 1 Spieler!');return;}
  m.day=document.getElementById('md-'+id).value;m.fmt=fv;m.type=fo.type;m.holes=fo.holes;
  m.ckey=document.getElementById('mck-'+id).value;m.nine=document.getElementById('mn9-'+id).value;
  m.tA=document.getElementById('mta-'+id).value;m.tB=document.getElementById('mtb-'+id).value;
  m.pA=pA;m.pB=pB;
  delete results[id];delete scores[id];
  saveData();recalcAll();renderSB();renderSP();showToast(id+' gespeichert');renderAdm();
}
function delM(id){
  if(!confirm('Match '+id+' löschen?'))return;
  MATCHES=MATCHES.filter(m=>m.id!==id);
  delete results[id];delete scores[id];
  saveData();recalcAll();renderSB();renderSP();showToast('Gelöscht');renderAdm();
}

// ── SPIELTAG GENERATOR ──────────────────────────────────────
// Generiert automatisch alle Paarungen für einen Tag
// Verwendet buildMtx() um optimale Balance zu erzielen
function genMatchesForFormat(fmt, day, ckey, nine, idPrefix, extraMatches){
  const fo=FMT_OPTS.find(f=>f.v===fmt);if(!fo)return[];
  const rot=PL.rot.map(p=>p.n);
  const blau=PL.blau.map(p=>p.n);
  // buildMtx mit extraMatches aufrufen (für beide Einzel und 2v2)
  const {mtx,pmtx}=buildMtx(extraMatches);
  const ts=Date.now();
  const pre=idPrefix||(day.slice(0,2).toUpperCase()+'_'+fo.type.toUpperCase()+'_'+ts);
  const h=fo.holes;const type=fo.type;

  if(type==='einzel'){
    // 1v1: feste Paarungen lt. Duell-Matrix (Diagonale = 1)
    const res=[];
    rot.forEach(function(r){
      const b=getFixedEinzelPartner(r);
      if(b&&blau.includes(b)){
        res.push({id:pre+'_'+(res.length+1),day:day,fmt:fmt,type:type,ckey:ckey,nine:nine,
          tA:'rot',tB:'blau',pA:[r],pB:[b],holes:h});
      }
    });
    return res;
  }

  // 2v2 (BB, Stableford, Greensome): 3 matches
  const rPairs=bestPairs(rot,mtx,blau,'rot',pmtx);
  const bPairs=bestPairs(blau,mtx,rot,'blau',pmtx);
  const assigned=assignPairs(rPairs,bPairs,mtx);
  return assigned.map(function(ab,i){
    return{id:pre+'_'+(i+1),day:day,fmt:fmt,type:type,ckey:ckey,nine:nine,
      tA:'rot',tB:'blau',pA:ab.rPair,pB:ab.bPair,holes:h};
  });
}

function previewGen(){
  const day=document.getElementById('gen-day').value;

  const ckey1=document.getElementById('gen-ckey1').value;

  const loch2=document.getElementById('gen-loch2')?document.getElementById('gen-loch2').value:'front';
  const ckey2=document.getElementById('gen-ckey2')?document.getElementById('gen-ckey2').value:ckey1;
  const ts=Date.now();
  genPreview=[];

  // Loch-Konfiguration
  const LOCH_CFG={
    'all':  {nine:'all', holes:18},
    'front':{nine:'front',holes:9},
    'back': {nine:'back', holes:9},
  };
  // Spielform → type + fmt-Name
  const SF_MAP={
    'bb':        {type:'bb',       name:'Best Ball'},
    'stabl':     {type:'stabl',    name:'Stableford'},
    'greensome': {type:'greensome',name:'Greensome'},
  };

  // Paarungen aus der optimalen Matrix
  const allDef=buildDEF_M();
  const dayRounds={
    'Donnerstag':{r1:[0,1,2],r2:[3,4,5]},
    'Freitag':   {r1:[6,7,8],r2:[9,10,11]},
    'Samstag':   {r1:[12,13,14],r2:[]}
  };
  const rounds=dayRounds[day]||{r1:[],r2:[]};

  const lc1=LOCH_CFG[loch1]||LOCH_CFG['all'];
  const sf1cfg=SF_MAP[sf1]||SF_MAP['bb'];
  const fmtName1=sf1cfg.name+' '+(lc1.holes===18?'18L':'9L');

  rounds.r1.forEach(function(idx,i){
    const base=allDef[idx];if(!base)return;
    genPreview.push({
      id:day.slice(0,2)+'_M'+(i+1)+'_'+ts,
      day:day,fmt:fmtName1,type:sf1cfg.type,
      ckey:ckey1,nine:lc1.nine,
      tA:'rot',tB:'blau',pA:base.pA,pB:base.pB,holes:lc1.holes
    });
  });

  if(sf2&&rounds.r2.length){
    const lc2=LOCH_CFG[loch2]||LOCH_CFG['front'];
    const sf2cfg=SF_MAP[sf2]||SF_MAP['bb'];
    const fmtName2=sf2cfg.name+' '+(lc2.holes===18?'18L':'9L');
    rounds.r2.forEach(function(idx,i){
      const base=allDef[idx];if(!base)return;
      genPreview.push({
        id:day.slice(0,2)+'_N'+(i+1)+'_'+ts,
        day:day,fmt:fmtName2,type:sf2cfg.type,
        ckey:ckey2,nine:lc2.nine,
        tA:'rot',tB:'blau',pA:base.pA,pB:base.pB,holes:lc2.holes
      });
    });
  }

  const prev=document.getElementById('gen-preview');
  if(!genPreview.length){prev.style.display='block';prev.innerHTML='<span style="color:var(--rot-m)">Keine Matches generiert.</span>';return;}
  const nineLabel={'all':'18L','front':'9L Vorne','back':'9L Hinten'};
  prev.style.display='block';
  prev.innerHTML='<strong style="color:var(--gold)">'+genPreview.length+' Matches für '+day+':</strong><br>'
    +genPreview.map(function(m){
      return'🔴 '+m.pA.join(' & ')+'&nbsp;vs&nbsp;🔵 '+m.pB.join(' & ')
        +'&nbsp;<span style="color:var(--grey);font-size:10px">('+m.fmt+' · '+(COURSES[m.ckey]?COURSES[m.ckey].name:m.ckey)+' · '+(nineLabel[m.nine]||m.nine)+')</span>';
    }).join('<br>');
}

function applyGen(){
  if(!genPreview.length){previewGen();if(!genPreview.length)return;}
  const day=genPreview[0].day;
  // Remove existing matches for this day
  const removed=MATCHES.filter(function(m){return m.day===day;}).length;
  MATCHES=MATCHES.filter(function(m){return m.day!==day;});
  // Add new matches
  genPreview.forEach(function(m){MATCHES.push(m);});
  const cnt=genPreview.length;
  genPreview=[];
  saveData();recalcAll();renderAdm();renderSB();renderSC();
  showToast(cnt+' Matches generiert ('+removed+' ersetzt)');
}

function bExtras(){
  var enabled=EXTRAS.ntp.enabled;
  var pts=EXTRAS.ntp.pts;
  // Build rounds: group matches by day+type (exclude einzel+duebler)
  var groups={};
  MATCHES.forEach(function(m){
    if(NTP_EXCL_TYPES.includes(m.type))return;
    var c=cd(m);
    var key=m.day+'__'+m.type;
    if(!groups[key])groups[key]={day:m.day,type:m.type,ckey:m.ckey,matches:[],par3holes:[]};
    getHoleIdx(m).forEach(function(h){
      if(c.par[h]===3&&!groups[key].par3holes.includes(h))groups[key].par3holes.push(h);
    });

// ─── DUELL-MATRIX ─────────────────────────────────────────
// ─── FESTE DUELL-MATRIX (lt. Turnierdokument) ─────────────
// Zeile = Rot-Spieler (Index 0-5), Spalte = Blau-Spieler (Index 0-5)


function buildMtx(extraMatches){
  const rot=PL.rot.map(p=>p.n);const blau=PL.blau.map(p=>p.n);
  const allP=rot.concat(blau);
  const mtx={};rot.forEach(r=>{mtx[r]={};blau.forEach(b=>{mtx[r][b]=0;});});
  const pmtx={};allP.forEach(p=>{pmtx[p]={};allP.forEach(q=>{pmtx[p][q]=0;});});
  const allMatches=MATCHES.concat(extraMatches||[]);

  // Wenn Spielplan leer: zeige optimale Matrix aus DUELL_MATRIX_DOC
  if(allMatches.length===0){
    rot.forEach(function(r,ri){
      blau.forEach(function(b,bi){
        mtx[r][b]=DUELL_MATRIX_DOC[ri][bi];
      });
    });
    return{mtx,pmtx,rot,blau};
  }

  allMatches.forEach(function(m){
    const rP=m.pA.concat(m.pB).filter(p=>rot.includes(p));
    const bP=m.pA.concat(m.pB).filter(p=>blau.includes(p));
    rP.forEach(r=>{bP.forEach(b=>{if(mtx[r])mtx[r][b]++;});});
    for(let i=0;i<m.pA.length;i++)for(let j=i+1;j<m.pA.length;j++){
      if(pmtx[m.pA[i]])pmtx[m.pA[i]][m.pA[j]]=(pmtx[m.pA[i]][m.pA[j]]||0)+1;
      if(pmtx[m.pA[j]])pmtx[m.pA[j]][m.pA[i]]=(pmtx[m.pA[j]][m.pA[i]]||0)+1;
    }
    for(let i=0;i<m.pB.length;i++)for(let j=i+1;j<m.pB.length;j++){
      if(pmtx[m.pB[i]])pmtx[m.pB[i]][m.pB[j]]=(pmtx[m.pB[i]][m.pB[j]]||0)+1;
      if(pmtx[m.pB[j]])pmtx[m.pB[j]][m.pB[i]]=(pmtx[m.pB[j]][m.pB[i]]||0)+1;
    }
  });
  return{mtx,pmtx,rot,blau};
}

// ─── FESTE DUELL-MATRIX (lt. Turnierdokument) ─────────────
// Zeile=Rot-Index(0-5), Spalte=Blau-Index(0-5)
// 0 = Einzel-Kandidat (nie im Team gespielt), 2 = 2x im Team gespielt
// Struktur: Rot0↔Blau5, Rot1↔Blau1, Rot2↔Blau3, Rot3↔Blau0, Rot4↔Blau4, Rot5↔Blau2
const DUELL_MATRIX_DOC=[
  [2,2,2,2,2,0], // Rot0 -> Blau5 (Einzel)
  [2,0,2,2,2,2], // Rot1 -> Blau1 (Einzel)
  [2,2,2,0,2,2], // Rot2 -> Blau3 (Einzel)
  [0,2,2,2,2,2], // Rot3 -> Blau0 (Einzel)
  [2,2,2,2,0,2], // Rot4 -> Blau4 (Einzel)
  [2,2,0,2,2,2], // Rot5 -> Blau2 (Einzel)
];
// Gibt die feste Einzel-Paarung fuer diesen Rot-Spieler zurueck (lt. Matrix)
function getFixedEinzelPartner(rotPlayer){
  // Captain's Pick: aus EXTRAS.einzel (manuell gesetzt)
  const picks=EXTRAS.einzel||[];
  const pick=picks.find(function(p){return p.rot===rotPlayer;});
  return pick?pick.blau:null;
}
// Gibt den natuerlichen Einzel-Kandidaten lt. Matrix zurueck (0er-Feld)
function getSuggestedEinzelPartner(rotPlayer){
  const rot=PL.rot.map(function(p){return p.n;});
  const blau=PL.blau.map(function(p){return p.n;});
  const ri=rot.indexOf(rotPlayer);
  if(ri<0)return null;
  const bi=DUELL_MATRIX_DOC[ri].indexOf(0);
  return bi>=0?blau[bi]:null;
}

// ─── AUTO-PAIRING ──────────────────────────────────────────
// Erzeugt ausgewogene Paarungen basierend auf aktueller Matrix
// Ziel: jede Rot-Blau Paarung möglichst gleich oft
function autoGeneratePairings(format,day,ckey,nine){
  const {mtx,rot,blau}=buildMtx();
  let newMatches=[];
  const idPrefix=day.slice(0,2).toUpperCase()+'_AUTO_'+Date.now();

  if(format==='einzel'){
    // 1v1: alle 6 Rot vs alle 6 Blau, sortiert nach wenigsten Begegnungen
    const pairs=[];
    rot.forEach(r=>blau.forEach(b=>pairs.push({r,b,cnt:mtx[r][b]})));
    pairs.sort((a,b2)=>a.cnt-b2.cnt);
    // Greedy: wähle Paarungen mit wenigsten Begegnungen, jeder Spieler nur 1x
    const usedR=new Set();const usedB=new Set();
    pairs.forEach(({r,b})=>{
      if(!usedR.has(r)&&!usedB.has(b)){
        usedR.add(r);usedB.add(b);
        newMatches.push({id:`${idPrefix}_${r}_${b}`,day,fmt:'Einzel 18L',type:'einzel',ckey,nine,tA:'rot',tB:'blau',pA:[r],pB:[b],holes:18});
      }
    });
  } else if(format==='bb2v2'){
    // 2v2 Best Ball: 3 Matches (alle 6 Rot und 6 Blau je einmal)
    // Bilde optimale Rot-Paare und Blau-Paare
    const rotPairs=bestPairs(rot,mtx,blau,'rot');
    const blauPairs=bestPairs(blau,mtx,rot,'blau');
    // Weise Paare einander zu: minimiere max Begegnungen
    const assigned=assignPairs(rotPairs,blauPairs,mtx);
    assigned.forEach(({rPair,bPair},i)=>{
      const fmtOpts={OLD:'Best Ball 18L',NEW:'Best Ball 18L',PAR3:'Dübler 9L'};
      const fmt2=fmtOpts[ckey]||'Best Ball 18L';
      const h=fmt2.includes('18')?18:9;
      newMatches.push({id:`${idPrefix}_BB${i+1}`,day,fmt:fmt2,type:ckey==='PAR3'?'duebler':'bb',ckey,nine,tA:'rot',tB:'blau',pA:rPair,pB:bPair,holes:h});
    });
  } else if(format==='stabl2v2'){
    // 2v2 Stableford: 3 Matches (2 Rot vs 2 Blau, kombinierte Punkte)
    const rotPairs=bestPairs(rot,mtx,blau,'rot');
    const blauPairs=bestPairs(blau,mtx,rot,'blau');
    const assigned=assignPairs(rotPairs,blauPairs,mtx);
    assigned.forEach(({rPair,bPair},i)=>{
      newMatches.push({id:`${idPrefix}_ST${i+1}`,day,fmt:'Stableford 9L',type:'stabl',ckey,nine,tA:'rot',tB:'blau',pA:rPair,pB:bPair,holes:9});
    });
  } else if(format==='greensome'){
    // Greensome 3x2v2: gemischte Paare (1 Rot + 1 Blau pro Team)
    // Hier werden Paare gebildet, aber jedes Paar hat EINEN Rot UND EINEN Blau
    // Wir machen 3 Matches: jedes Match hat je 2 Spieler pro Seite
    const rotPairs=bestPairs(rot,mtx,blau,'rot');
    const blauPairs=bestPairs(blau,mtx,rot,'blau');
    const assigned=assignPairs(rotPairs,blauPairs,mtx);
    assigned.forEach(({rPair,bPair},i)=>{
      newMatches.push({id:`${idPrefix}_GR${i+1}`,day,fmt:'Greensome 9L',type:'greensome',ckey,nine,tA:'rot',tB:'blau',pA:rPair,pB:bPair,holes:9});
    });
  }
  return newMatches;
}

// Bilde optimale Paare aus einer Liste (greedy, minimiere Begegnungen)
function bestPairs(players,mtx,opponents,side,pmtx){
  // Score pro Paar: Gegner-Begegnungen + Partner-Begegnungen (beide minimieren)
  const pairs=[];
  for(let i=0;i<players.length;i++){
    for(let j=i+1;j<players.length;j++){
      // Wie oft gegen Gegner gespielt
      let oppEnc=0;
      opponents.forEach(function(opp){
        oppEnc+=side==='rot'?(mtx[players[i]][opp]||0)+(mtx[players[j]][opp]||0)
                            :(mtx[opp][players[i]]||0)+(mtx[opp][players[j]]||0);
      });
      // Wie oft zusammen gespielt (Partner-Score, gleich gewichtet)
      const partnerEnc=pmtx?(pmtx[players[i]][players[j]]||0):0;
      // Gesamt: Partner stärker gewichten damit Abwechslung im Team gewährleistet
      pairs.push({p:[players[i],players[j]],score:oppEnc+partnerEnc*2});
    }
  }
  pairs.sort(function(a,b){return a.score-b.score;});
  const used=new Set();const result=[];
  pairs.forEach(function({p}){
    if(!used.has(p[0])&&!used.has(p[1])){used.add(p[0]);used.add(p[1]);result.push(p);}
  });
  return result;
}

// Weise Rot-Paare den Blau-Paaren zu um Begegnungen zu minimieren
function assignPairs(rotPairs,blauPairs,mtx){
  const n=Math.min(rotPairs.length,blauPairs.length);
  // Try all permutations for n<=3, take best
  const perms=permutations([...Array(n).keys()]);
  let bestPerm=perms[0];let bestScore=Infinity;
  perms.forEach(perm=>{
    let score=0;
    perm.forEach((bi,ri)=>{
      const rP=rotPairs[ri];const bP=blauPairs[bi];
      rP.forEach(r=>bP.forEach(b=>score+=(mtx[r]?.[b]||0)));
    });
    if(score<bestScore){bestScore=score;bestPerm=perm;}
  });
  return bestPerm.map((bi,ri)=>({rPair:rotPairs[ri],bPair:blauPairs[bi]}));
}
function permutations(arr){
  if(arr.length<=1)return[arr];
  const result=[];
  arr.forEach((v,i)=>{const rest=[...arr.slice(0,i),...arr.slice(i+1)];permutations(rest).forEach(p=>result.push([v,...p]));});
  return result;
}

// Paarungen dynamisch aus Captain's Picks (EXTRAS.einzel) abgeleitet:
// Je 2 Einzel-Paare werden zu einem 2v2 Dübler-Match zusammengelegt.
function getDueblerPairs(){
  var picks=EXTRAS.einzel||[];
  var pairs=[];
  for(var i=0;i+1<picks.length;i+=2){
    pairs.push({pA:[picks[i].rot,picks[i+1].rot],pB:[picks[i].blau,picks[i+1].blau]});
  }
  return pairs;
}
function addDueblerMatches(){
  const day=document.getElementById('du-day')?.value||'Dübler Par3';
  const ckey='PAR3';
  const nine='9';
  const holes=9;
  const fmt='Dübler 9L';
  const type='duebler';
  const ts=Date.now();
  // Read pairs from dropdowns
  const basePairs=getDueblerPairs();
  const pairs=[];
  for(let i=0;i<basePairs.length;i++){
    const pAEl=document.getElementById('du-pA-'+i);
    const pBEl=document.getElementById('du-pB-'+i);
    const pA=pAEl?Array.from(pAEl.selectedOptions).map(o=>o.value):basePairs[i].pA;
    const pB=pBEl?Array.from(pBEl.selectedOptions).map(o=>o.value):basePairs[i].pB;
    if(pA.length!==2||pB.length!==2){showToast('Bitte genau 2 Spieler pro Seite wählen (Match '+(i+1)+')');return;}
    pairs.push({pA,pB});
  }
  if(!pairs.length){showToast('Keine Einzel-Paarungen definiert! Bitte zuerst Captain\'s Pick setzen.');return;}
  // Check duplicates
  const alreadyHas=pairs.every(dp=>
    MATCHES.some(m=>m.type==='duebler'&&m.pA.join()===dp.pA.join()&&m.pB.join()===dp.pB.join()&&m.day===day)
  );
  if(alreadyHas){showToast('Dübler bereits vorhanden!');return;}
  pairs.forEach(function(dp,i){
    MATCHES.push({
      id:'DU_'+ts+'_'+(i+1),day,fmt,type,ckey,nine,
      tA:'rot',tB:'blau',
      pA:dp.pA,pB:dp.pB,holes
    });
  });
  saveData();recalcAll();renderAdm();renderSB();renderSC();
  showToast(pairs.length+' Dübler-Matches ('+day+') hinzugefügt ✓');
}

function removeDueblerMatches(){
  var day=document.getElementById('du-day')?.value||'';
  var before=MATCHES.length;
  if(day){
    MATCHES=MATCHES.filter(function(m){return!(m.type==='duebler'&&m.day===day);});
  } else {
    MATCHES=MATCHES.filter(function(m){return m.type!=='duebler';});
  }
  var removed=before-MATCHES.length;
  if(!removed){showToast('Keine Dübler-Matches gefunden');return;}
  // Scores löschen
  MATCHES.filter(function(m){return m.type==='duebler';}).forEach(function(m){delete results[m.id];delete scores[m.id];});
  saveData();recalcAll();renderAdm();renderSB();renderSC();
  showToast(removed+' Dübler-Match'+(removed===1?'':'es')+' entfernt ✓');
}

function getArchiv(){
  try{return JSON.parse(localStorage.getItem('c26archiv')||'[]');}catch(e){return[];}

function saveArchiv(arr){localStorage.setItem('c26archiv',JSON.stringify(arr));}

function archivieren(){
  var nameEl=document.getElementById('archiv-name');
  var name=(nameEl?nameEl.value.trim():'');
  if(!name){showToast('Bitte Turniername eingeben');return;}

  // Matrix berechnen
  var rot=PL.rot.map(function(p){return p.n;});
  var blau=PL.blau.map(function(p){return p.n;});
  var mtx={};
  rot.forEach(function(r){
    mtx[r]={};
    blau.forEach(function(b){mtx[r][b]=0;});
  });
  MATCHES.forEach(function(m){
    var rP=m.pA.concat(m.pB).filter(function(p){return rot.includes(p);});
    var bP=m.pA.concat(m.pB).filter(function(p){return blau.includes(p);});
    rP.forEach(function(r){bP.forEach(function(b){if(mtx[r])mtx[r][b]++;});});
  });

  // Scoreboard
  var tots=getTotals();
  var matchRes=MATCHES.map(function(m){
    var x=results[m.id];
    if(!x)return null;
    var fl={bb:'Best Ball',stabl:'Stableford',greensome:'Greensome',duebler:'Duebler',einzel:'Einzel'}[m.type]||m.type;
    return{
      id:m.id,day:m.day,fmt:fl,
      pA:m.pA.join('+'),pB:m.pB.join('+'),
      tA:m.tA,tB:m.tB,
      rotPts:x.rotPts||0,blauPts:x.blauPts||0
    };
  }).filter(Boolean);

  // Vollständiger Spielplan (alle Matches, auch ohne Ergebnis)
  var fmtNames={bb:'Best Ball',stabl:'Stableford',greensome:'Greensome',duebler:'Dübler',einzel:'Einzel'};
  var spielplan=MATCHES.map(function(m){
    var x=results[m.id];
    return{
      id:m.id,day:m.day,fmt:fmtNames[m.type]||m.type,type:m.type,
      ckey:m.ckey,holes:m.holes,
      pA:m.pA.join(' & '),pB:m.pB.join(' & '),
      tA:m.tA,tB:m.tB,
      rotPts:x?(m.tA==='rot'?x.rotPts:x.blauPts):null,
      blauPts:x?(m.tA==='rot'?x.blauPts:x.rotPts):null
    };
  });

  var entry={
    id:'arc_'+Date.now(),
    name:name,
    datum:new Date().toLocaleDateString('de-DE'),
    rotName:'Team Rot',
    blauName:'Team Blau',
    rotTotal:tots.rot,
    blauTotal:tots.blau,
    rot:rot,
    blau:blau,
    hcps:{},
    mtx:mtx,
    matches:matchRes,
    spielplan:spielplan
  };
  // HCPs speichern
  PL.rot.concat(PL.blau).forEach(function(p){entry.hcps[p.n]=p.hcp;});

  var arr=getArchiv();
  arr.unshift(entry);
  saveArchiv(arr);
  showToast(name+' archiviert ✓');
  renderAdm();
}

function delArchiv(id){
  showConfirm('Turnier loeschen?','Dieser Eintrag wird permanent geloescht.',function(){
    var arr=getArchiv().filter(function(e){return e.id!==id;});
    saveArchiv(arr);
    renderAdm();
    showToast('Geloescht ✓');
  });
}

  var arr=getArchiv();

    +'<h3>📦 Turnier archivieren</h3>'
    +'<div style="font-size:11px;color:var(--grey);margin-bottom:12px">'
    +'Speichert den aktuellen Endstand und die Begegnungsmatrix. Loch-Scores werden nicht gespeichert.</div>'
    +'<div style="display:flex;gap:8px;align-items:flex-end">'
    +'<div style="flex:1"><div class="el">Turniername</div>'
    +'<input type="text" class="ain" id="archiv-name" placeholder="z.B. The Cup 2026" style="width:100%"></div>'
    +'<button class="svb" onclick="archivieren()" style="flex-shrink:0;height:42px">💾 Archivieren</button>'
    +'</div>'

    +'Aktuell: <strong style="color:var(--gold)">🔴 Rot '+fmt(getTotals().rot)+'</strong> &nbsp;vs&nbsp; '
    +'<strong style="color:var(--blau-m)">🔵 Blau '+fmt(getTotals().blau)+'</strong>'
    +'</div></div>';

  if(!arr.length){
    return form+'<div class="ac"><div style="text-align:center;color:var(--grey);font-size:13px;padding:20px 0">Noch keine archivierten Turniere</div></div>';
  }

  // Archiv-Einträge
  var entries=arr.map(function(e){
    var winner=e.rotTotal>e.blauTotal?'🔴 Team Rot gewinnt'
      :e.blauTotal>e.rotTotal?'🔵 Team Blau gewinnt'
      :'🤝 Unentschieden';
    var winCls=e.rotTotal>e.blauTotal?'var(--rot-m)':e.blauTotal>e.rotTotal?'var(--blau-m)':'var(--gold)';

    // Matrix
    var hdr=e.blau.map(function(b){
      return'<th style="color:var(--blau-m);font-size:9px;padding:3px 4px">'+b.slice(0,4)+'</th>';
    }).join('');
    var maxV=0;
    e.rot.forEach(function(r){e.blau.forEach(function(b){if((e.mtx[r]||{})[b]>maxV)maxV=(e.mtx[r]||{})[b];});});
    var rows=e.rot.map(function(r){
      return'<tr><th style="color:var(--rot-m);font-size:9px;padding:3px 4px;text-align:left">'+r+'</th>'
        +e.blau.map(function(b){
          var v=(e.mtx[r]||{})[b]||0;
