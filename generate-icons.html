<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h2>Icon Generator – The Cup 2026</h2>
<p id="status">Klicke auf einen Button um das Icon herunterzuladen.</p>
<div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:24px 0">
  <button onclick="gen(192,'icon-192.png')" style="padding:12px 20px;font-size:16px;cursor:pointer">📥 icon-192.png</button>
  <button onclick="gen(512,'icon-512.png')" style="padding:12px 20px;font-size:16px;cursor:pointer">📥 icon-512.png</button>
  <button onclick="gen(180,'apple-touch-icon.png')" style="padding:12px 20px;font-size:16px;cursor:pointer">📥 apple-touch-icon.png</button>
</div>
<canvas id="c" style="display:none"></canvas>
<script>
var svgSrc = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="55%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <text x="256" y="190" font-family="Arial Black,Arial" font-weight="900" font-size="110" fill="#ffffff" text-anchor="middle" letter-spacing="8">THE</text>
  <text x="256" y="320" font-family="Arial Black,Arial" font-weight="900" font-size="130" fill="#C9960A" text-anchor="middle" letter-spacing="6">CUP</text>
  <text x="256" y="405" font-family="Arial Black,Arial" font-weight="900" font-size="58" fill="#000000" text-anchor="middle" letter-spacing="16">2026</text>
</svg>`;

function gen(size, filename) {
  var status = document.getElementById('status');
  status.textContent = 'Generiere ' + filename + '...';
  var canvas = document.getElementById('c');
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext('2d');
  var blob = new Blob([svgSrc], {type: 'image/svg+xml'});
  var url = URL.createObjectURL(blob);
  var img = new Image();
  img.onload = function() {
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(pngBlob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(pngBlob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 1000);
      status.textContent = filename + ' heruntergeladen ✓';
    }, 'image/png');
  };
  img.src = url;
}
</script>
</body>
</html>
